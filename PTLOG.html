    const Modal = ({ title, children, onClose }) => (

        </div>

    );

    const MetricCard = ({ icon, value, label, trend, color }) => (
      <div className="bg-gray-800/50 backdrop-blur border border-gray-700/50 rounded-2xl p-5 hover:border-gray-600 transition-all">
        <div className="flex items-start justify-between">
          <div className={`w-12 h-12 rounded-xl ${color} flex items-center justify-center text-2xl`}>{icon}</div>
          {trend !== undefined && trend !== null && (
            <span className={`text-xs px-2 py-1 rounded-full ${trend >= 0 ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}`}>
              {trend >= 0 ? '↑' : '↓'} {Math.abs(trend)}%
            </span>
          )}
        </div>
        <div className="mt-4">
          <div className="text-3xl font-bold text-white">{value}</div>
          <div className="text-gray-400 text-sm mt-1">{label}</div>
        </div>
      </div>
    );

    const ProgressBar = ({ current, goal, label, color = "from-cyan-500 to-cyan-400" }) => {
      const percentage = goal > 0 ? Math.min((current / goal) * 100, 100) : 0;
      return (
        <div className="mb-4">
          <div className="flex justify-between mb-2">
            <span className="text-gray-300 text-sm font-medium">{label}</span>
            <span className="text-white text-sm font-semibold">{current.toLocaleString()} / {goal.toLocaleString()}</span>
          </div>
          <div className="h-3 bg-gray-700 rounded-full overflow-hidden">
            <div className={`h-full rounded-full bg-gradient-to-r ${color} transition-all duration-700`} style={{ width: `${percentage}%` }} />
          </div>
        </div>
      );
    };

    const MonthlyIncomeChart = ({ payments, currency = '€' }) => {
      const monthlyData = [];
      const now = new Date();
      for (let i = 5; i >= 0; i--) {
        const date = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const monthName = date.toLocaleString('en-US', { month: 'short' });
        const monthPayments = payments.filter(p => {
          const pDate = new Date(p.date);
          return pDate.getMonth() === date.getMonth() && pDate.getFullYear() === date.getFullYear();
        });
        const income = monthPayments.reduce((sum, p) => sum + parseFloat(p.amount || 0), 0);
        monthlyData.push({ month: monthName, income, isCurrentMonth: i === 0 });
      }
      const maxIncome = Math.max(...monthlyData.map(m => m.income), 1);
      return (
        <div className="flex items-end justify-between gap-3 h-48">
          {monthlyData.map((month, i) => (
            <div key={i} className="flex-1 flex flex-col items-center gap-2">
              <span className="text-emerald-400 text-sm font-medium">{currency}{month.income >= 1000 ? (month.income/1000).toFixed(1)+'k' : month.income}</span>
              <div className="w-full bg-gray-700/50 rounded-lg relative overflow-hidden" style={{ height: '120px' }}>
                <div className={`absolute bottom-0 w-full rounded-lg transition-all duration-700 ${month.isCurrentMonth ? 'bg-gradient-to-t from-cyan-500 to-cyan-400' : 'bg-gradient-to-t from-emerald-600 to-emerald-400'}`} style={{ height: `${(month.income / maxIncome) * 100}%` }} />
              </div>
              <span className={`text-xs font-medium ${month.isCurrentMonth ? 'text-cyan-400' : 'text-gray-400'}`}>{month.month}</span>
            </div>
          ))}
        </div>
      );
    };

    const YearlyIncomePattern = ({ payments, currency = '€' }) => {
      const now = new Date();
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const yearlyData = months.map((month, index) => {
        const monthPayments = payments.filter(p => { const pDate = new Date(p.date); return pDate.getMonth() === index && pDate.getFullYear() === now.getFullYear(); });
        return { month, income: monthPayments.reduce((sum, p) => sum + parseFloat(p.amount || 0), 0) };
      });
      const totalIncome = yearlyData.reduce((sum, m) => sum + m.income, 0);
      const avgIncome = yearlyData.filter(m => m.income > 0).length > 0 ? totalIncome / yearlyData.filter(m => m.income > 0).length : 0;
      const getStrength = (income) => {
        if (income === 0) return { color: 'bg-gray-700', textColor: 'text-gray-500' };
        if (income >= avgIncome * 1.15) return { color: 'bg-emerald-500/30 border border-emerald-500/50', textColor: 'text-emerald-400' };
        if (income <= avgIncome * 0.85) return { color: 'bg-red-500/20 border border-red-500/50', textColor: 'text-red-400' };
        return { color: 'bg-cyan-500/20 border border-cyan-500/50', textColor: 'text-cyan-400' };
      };
      return (
        <div>
          <div className="grid grid-cols-4 sm:grid-cols-6 lg:grid-cols-12 gap-2 mb-6">
            {yearlyData.map((m, i) => {
              const strength = getStrength(m.income);
              return (
                <div key={i} className={`rounded-xl p-3 text-center ${strength.color} ${i === now.getMonth() ? 'ring-2 ring-cyan-400' : ''}`}>
                  <div className="text-xs text-gray-400 mb-1">{m.month}</div>
                  <div className={`text-sm font-bold ${strength.textColor}`}>{m.income > 0 ? `${currency}${(m.income/1000).toFixed(1)}k` : '-'}</div>
                </div>
              );
            })}
          </div>
          <div className="flex flex-wrap gap-4 text-sm">
            <div className="flex items-center gap-2"><div className="w-3 h-3 rounded bg-emerald-500/50"></div><span className="text-gray-400">Strong</span></div>
            <div className="flex items-center gap-2"><div className="w-3 h-3 rounded bg-cyan-500/50"></div><span className="text-gray-400">Average</span></div>
            <div className="flex items-center gap-2"><div className="w-3 h-3 rounded bg-red-500/30"></div><span className="text-gray-400">Weak</span></div>
          </div>
        </div>
      );
    };

    const SessionsPerMonthChart = ({ payments, sessionLogs = [] }) => {
      const now = new Date();
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const sessionData = months.map((month, index) => {
        // Use session_logs if available, otherwise fall back to payment date
        let sessions = 0;
        if (sessionLogs.length > 0) {
          sessions = sessionLogs.filter(l => { 
            const lDate = new Date(l.completed_at); 
            return lDate.getMonth() === index && lDate.getFullYear() === now.getFullYear(); 
          }).length;
        } else {
          // Fallback: count from payments (old behavior)
          const monthPayments = payments.filter(p => { const pDate = new Date(p.date); return pDate.getMonth() === index && pDate.getFullYear() === now.getFullYear(); });
          sessions = monthPayments.reduce((sum, p) => sum + (p.sessions_completed || 0), 0);
        }
        return { month, sessions, isCurrentMonth: index === now.getMonth() };
      });
      const maxSessions = Math.max(...sessionData.map(m => m.sessions), 1);
      const totalSessions = sessionData.reduce((sum, m) => sum + m.sessions, 0);
      const avgSessions = sessionData.filter(m => m.sessions > 0).length > 0 ? Math.round(totalSessions / sessionData.filter(m => m.sessions > 0).length) : 0;
      return (
        <div>
          <div className="flex items-end justify-between gap-1 h-32 mb-4">
            {sessionData.map((m, i) => (
              <div key={i} className="flex-1 flex flex-col items-center gap-1">
                <span className={`text-xs font-medium ${m.isCurrentMonth ? 'text-cyan-400' : 'text-purple-400'}`}>{m.sessions || ''}</span>
                <div className="w-full bg-gray-700/50 rounded relative overflow-hidden" style={{ height: '80px' }}>
                  <div className={`absolute bottom-0 w-full rounded ${m.isCurrentMonth ? 'bg-gradient-to-t from-cyan-500 to-cyan-400' : 'bg-gradient-to-t from-purple-600 to-purple-400'}`} style={{ height: `${(m.sessions / maxSessions) * 100}%` }} />
                </div>
                <span className={`text-xs ${m.isCurrentMonth ? 'text-cyan-400' : 'text-gray-500'}`}>{m.month.slice(0,1)}</span>
              </div>
            ))}
          </div>
          <div className="flex justify-between text-sm pt-4 border-t border-gray-700">
            <span className="text-gray-400">Total: <span className="text-white font-semibold">{totalSessions}</span></span>
            <span className="text-gray-400">Avg: <span className="text-purple-400 font-semibold">{avgSessions}/mo</span></span>
          </div>
        </div>
      );
    };

    // Auth Screen - Shows SIGN UP by default if coming from payment
    const AuthScreen = ({ onLogin }) => {
      const [isLogin, setIsLogin] = useState(!justPaid); // Show Sign Up if just paid
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);
      
      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          const { data, error } = isLogin 
            ? await supabaseClient.auth.signInWithPassword({ email, password })
            : await supabaseClient.auth.signUp({ email, password });
          if (error) throw error;
          if (data.user) onLogin(data.user);
        } catch (err) { setError(err.message); }
        finally { setLoading(false); }
      };
      
      return (
        <div className="min-h-screen bg-gray-900 flex items-center justify-center p-4">
          <div className="fixed inset-0 bg-gradient-to-br from-gray-900 via-gray-900 to-gray-800 pointer-events-none" />
          <div className="fixed top-0 right-0 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl pointer-events-none" />
          <div className="fixed bottom-0 left-0 w-96 h-96 bg-emerald-500/10 rounded-full blur-3xl pointer-events-none" />
          <div className="relative bg-gray-800 border border-gray-700 rounded-2xl p-8 w-full max-w-md">
            <div className="text-center mb-8">
              <h1 className="text-3xl font-bold text-cyan-400">PT LOG</h1>
              <p className="text-gray-400 mt-2">Revenue Compass for Coaches</p>
            </div>
            
            {/* Welcome message for users coming from payment */}
            {justPaid && !isLogin && (
              <div className="bg-emerald-500/10 border border-emerald-500/30 rounded-xl p-4 mb-6">
                <p className="text-emerald-400 font-medium text-center">🎉 Payment successful!</p>
                <p className="text-gray-400 text-sm text-center mt-1">Create your account using the <strong>same email</strong> you used for payment.</p>
              </div>
            )}
            
            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="block text-gray-400 text-sm mb-2">Email</label>
                <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3 text-white focus:border-cyan-500 focus:outline-none" placeholder="Use the same email from payment" required />
              </div>
              <div>
                <label className="block text-gray-400 text-sm mb-2">Password</label>
                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3 text-white focus:border-cyan-500 focus:outline-none" placeholder="Min 6 characters" required minLength={6} />
              </div>
              {error && <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-3 text-red-400 text-sm">{error}</div>}
              <button type="submit" disabled={loading} className="w-full py-3 bg-cyan-500 hover:bg-cyan-400 disabled:bg-gray-600 text-gray-900 font-semibold rounded-xl">{loading ? 'Loading...' : isLogin ? 'Sign In' : 'Create Account'}</button>
            </form>
            <p className="text-center mt-6 text-gray-400">{isLogin ? "Don't have an account?" : "Already have an account?"} <button onClick={() => setIsLogin(!isLogin)} className="text-cyan-400 hover:text-cyan-300">{isLogin ? 'Sign Up' : 'Sign In'}</button></p>
          </div>
        </div>
      );
    };

    const App = () => {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [subscription, setSubscription] = useState(null);
      const [checkingSub, setCheckingSub] = useState(false);
      const [clients, setClients] = useState([]);
      const [payments, setPayments] = useState([]);
      const [expenses, setExpenses] = useState([]);
      const [targets, setTargets] = useState([]);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [showNewClientModal, setShowNewClientModal] = useState(false);
      const [showPaymentModal, setShowPaymentModal] = useState(false);
      const [showExpenseModal, setShowExpenseModal] = useState(false);
      const [showExpenseListModal, setShowExpenseListModal] = useState(false);
      const [showTargetsModal, setShowTargetsModal] = useState(false);
      const [showSettingsModal, setShowSettingsModal] = useState(false);
      const [showEditClientModal, setShowEditClientModal] = useState(false);
      const [showClientDetailModal, setShowClientDetailModal] = useState(false);
      const [showChallengeModal, setShowChallengeModal] = useState(false);
      const [showSessionDateModal, setShowSessionDateModal] = useState(false);
      const [pendingSession, setPendingSession] = useState(null);
      const [sessionDate, setSessionDate] = useState(new Date().toISOString().split('T')[0]);
      const [sessionLogs, setSessionLogs] = useState([]);
      const [selectedClient, setSelectedClient] = useState(null);
      const [editingClient, setEditingClient] = useState(null);
      const [editingExpense, setEditingExpense] = useState(null);
      const [currency, setCurrency] = useState(() => localStorage.getItem('ptlog_currency') || '€');
      const [darkMode, setDarkMode] = useState(() => localStorage.getItem('ptlog_darkmode') !== 'false');
      const [businessName, setBusinessName] = useState(() => localStorage.getItem('ptlog_business_name') || '');
      const [showOnboarding, setShowOnboarding] = useState(() => !localStorage.getItem('ptlog_onboarded'));
      const [swipingPayment, setSwipingPayment] = useState(null);
      const [swipeX, setSwipeX] = useState(0);
      const [weeklyCapacity, setWeeklyCapacity] = useState(() => parseInt(localStorage.getItem('ptlog_weekly_capacity')) || 30);
      const [revenueSharePercent, setRevenueSharePercent] = useState(() => parseInt(localStorage.getItem('ptlog_revenue_share')) || 0);
      const [monthlyChallenge, setMonthlyChallenge] = useState(() => JSON.parse(localStorage.getItem('ptlog_challenge') || '{"type":"sessions","target":40,"title":"Complete 40 Sessions"}'));
      const [newChallenge, setNewChallenge] = useState({ type: 'sessions', target: 40, title: 'Complete 40 Sessions' });
      const [newClient, setNewClient] = useState({ name: '', email: '', phone: '', referred_by: '' });
      const [newPayment, setNewPayment] = useState({ client_id: '', type: 'Pack', amount: '', sessions: '', duration: 60, date: new Date().toISOString().split('T')[0] });
      const [newExpense, setNewExpense] = useState({ category: 'Rent', amount: '', note: '', date: new Date().toISOString().split('T')[0], share_percentage: '', share_mode: 'monthly', share_payment_id: '' });
      const [editTargets, setEditTargets] = useState({ revenueGoal: 5000, clientsGoal: 15 });

      const currencies = ['€', '$', '£'];
      const expenseCategories = ['Rent', 'Equipment', 'Share', 'Marketing', 'Insurance', 'Certifications', 'Software', 'Other'];
      
      const saveBusinessName = (name) => {
        setBusinessName(name);
        localStorage.setItem('ptlog_business_name', name);
      };
      
      const saveRevenueShare = (percent) => {
        setRevenueSharePercent(percent);
        localStorage.setItem('ptlog_revenue_share', percent.toString());
      };

      const saveWeeklyCapacity = (hours) => {
        setWeeklyCapacity(hours);
        localStorage.setItem('ptlog_weekly_capacity', hours.toString());
      };

      const saveChallenge = () => {
        setMonthlyChallenge(newChallenge);
        localStorage.setItem('ptlog_challenge', JSON.stringify(newChallenge));

        setShowChallengeModal(false);
      };

      const toggleDarkMode = () => {
        const newMode = !darkMode;
        setDarkMode(newMode);
        localStorage.setItem('ptlog_darkmode', newMode.toString());
      };

      const completeOnboarding = () => {
        setShowOnboarding(false);
        localStorage.setItem('ptlog_onboarded', 'true');
      };

      const handleSwipeStart = (e, paymentId) => {
        setSwipingPayment(paymentId);
        setSwipeX(e.touches ? e.touches[0].clientX : e.clientX);
      };

      const handleSwipeMove = (e) => {
        if (!swipingPayment) return;
        const currentX = e.touches ? e.touches[0].clientX : e.clientX;
        const diff = currentX - swipeX;
        if (diff > 60) {
          // Swipe right - complete session
          const payment = payments.find(p => p.id === swipingPayment);
          if (payment && payment.sessions_completed < payment.sessions) {
            updateSession(payment.id, payment.sessions_completed, payment.sessions, 'add');
          }
          setSwipingPayment(null);
        }
      };

      const handleSwipeEnd = () => {
        setSwipingPayment(null);
      };
      
      const saveCurrency = (curr) => {
        setCurrency(curr);
        localStorage.setItem('ptlog_currency', curr);
      };

      const handleEditClient = (client) => {
        setEditingClient({ ...client });
        setShowEditClientModal(true);
      };

      const handleViewClient = (client) => {
        setSelectedClient(client);
        setShowClientDetailModal(true);
      };

      const handleUpdateClient = async () => {
        if (!editingClient?.name?.trim()) return;
        await supabaseClient.from('clients').update({ name: editingClient.name, notes: editingClient.notes || '' }).eq('id', editingClient.id);
        setShowEditClientModal(false);
        setEditingClient(null);
        fetchAllData();
      };

      const handleDeleteClient = async (clientId) => {
        if (!confirm('Delete this client? Their payment history will be kept for your records.')) return;
        await supabaseClient.from('clients').update({ status: 'Deleted' }).eq('id', clientId);
        fetchAllData();
      };

      // Calculate streaks and milestones
      const calculateStreaksAndMilestones = () => {
        const now = new Date();
        const milestones = [];
        
        // Total revenue milestones
        const totalRev = payments.reduce((s, p) => s + parseFloat(p.amount || 0), 0);
        const revenueMilestones = [1000, 5000, 10000, 25000, 50000, 100000];
        const reachedRevenue = revenueMilestones.filter(m => totalRev >= m);
        if (reachedRevenue.length > 0) {
          milestones.push({ type: 'revenue', value: reachedRevenue[reachedRevenue.length - 1], icon: '💰' });
        }
        
        // Total sessions completed
        const totalSessions = payments.reduce((s, p) => s + (p.sessions_completed || 0), 0);
        const sessionMilestones = [50, 100, 250, 500, 1000, 2500];
        const reachedSessions = sessionMilestones.filter(m => totalSessions >= m);
        if (reachedSessions.length > 0) {
          milestones.push({ type: 'sessions', value: reachedSessions[reachedSessions.length - 1], icon: '🏋️' });
        }
        
        // Total clients
        const totalClients = clients.filter(c => c.status !== 'Deleted').length;
        const clientMilestones = [5, 10, 25, 50, 100];
        const reachedClients = clientMilestones.filter(m => totalClients >= m);
        if (reachedClients.length > 0) {
          milestones.push({ type: 'clients', value: reachedClients[reachedClients.length - 1], icon: '👥' });
        }
        
        // Calculate monthly streak (consecutive months hitting revenue goal)
        let streak = 0;
        const goal = targets.find(t => t.target_name === 'Monthly Revenue')?.goal || 5000;
        for (let i = 0; i <= 12; i++) {
          const date = new Date(now.getFullYear(), now.getMonth() - i, 1);
          const monthPayments = payments.filter(p => {
            const pDate = new Date(p.date);
            return pDate.getMonth() === date.getMonth() && pDate.getFullYear() === date.getFullYear();
          });
          const monthRevenue = monthPayments.reduce((s, p) => s + parseFloat(p.amount || 0), 0);
          if (monthRevenue >= goal) {
            streak++;
          } else if (i > 0) {
            break;
          }
        }
        
        return { milestones, streak, totalRev, totalSessions, totalClients };
      };

      // Calculate advanced analytics
      const calculateAdvancedAnalytics = () => {
        const now = new Date();
        
        // Income by Type
        const incomeByType = {
          Single: payments.filter(p => p.type === 'Single').reduce((s, p) => s + parseFloat(p.amount || 0), 0),
          Pack: payments.filter(p => p.type === 'Pack').reduce((s, p) => s + parseFloat(p.amount || 0), 0),
          Monthly: payments.filter(p => p.type === 'Monthly').reduce((s, p) => s + parseFloat(p.amount || 0), 0)
        };
        const totalIncome = incomeByType.Single + incomeByType.Pack + incomeByType.Monthly;

        // Best Day of Week
        const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const incomeByDay = [0, 0, 0, 0, 0, 0, 0];
        payments.forEach(p => {
          const day = new Date(p.date).getDay();
          incomeByDay[day] += parseFloat(p.amount || 0);
        });
        const bestDayIndex = incomeByDay.indexOf(Math.max(...incomeByDay));
        const bestDay = { name: dayNames[bestDayIndex], amount: incomeByDay[bestDayIndex] };

        // Average Pack Size
        const packs = payments.filter(p => p.type === 'Pack');
        const avgPackSize = packs.length > 0 ? packs.reduce((s, p) => s + (p.sessions || 0), 0) / packs.length : 0;
        const avgPackValue = packs.length > 0 ? packs.reduce((s, p) => s + parseFloat(p.amount || 0), 0) / packs.length : 0;

        // Client Retention Rate
        const clientsWithMultiplePayments = clients.filter(c => {
          const clientPayments = payments.filter(p => p.client_id === c.id);
          return clientPayments.length > 1;
        }).length;
        const activeClientCount = clients.filter(c => c.status !== 'Deleted').length;
        const retentionRate = activeClientCount > 0 ? (clientsWithMultiplePayments / activeClientCount) * 100 : 0;

        // Sessions by Day
        const sessionsByDay = [0, 0, 0, 0, 0, 0, 0];
        payments.forEach(p => {
          const day = new Date(p.date).getDay();
          sessionsByDay[day] += (p.sessions_completed || 0);
        });

        // === NEW FEATURES ===

        // 1. Upsell Opportunities - clients who consistently buy small packs and might upgrade
        const upsellOpportunities = clients.filter(c => {
          const clientPacks = payments.filter(p => p.client_id === c.id && p.type === 'Pack');
          if (clientPacks.length < 2) return false;
          const avgSessions = clientPacks.reduce((s, p) => s + (p.sessions || 0), 0) / clientPacks.length;
          const completionRate = clientPacks.reduce((s, p) => s + (p.sessions_completed || 0), 0) / clientPacks.reduce((s, p) => s + (p.sessions || 0), 0);
          return avgSessions < 10 && completionRate > 0.8; // Small packs, high completion
        }).map(c => ({
          ...c,
          currentAvgPack: payments.filter(p => p.client_id === c.id && p.type === 'Pack').reduce((s, p) => s + (p.sessions || 0), 0) / payments.filter(p => p.client_id === c.id && p.type === 'Pack').length,
          totalSpent: payments.filter(p => p.client_id === c.id).reduce((s, p) => s + parseFloat(p.amount || 0), 0)
        }));

        // 2. Capacity Utilization - use session_logs if available
        const thisMonthSessions = sessionLogs.length > 0 
          ? sessionLogs.filter(l => {
              const d = new Date(l.completed_at);
              return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            }).length
          : payments.filter(p => {
              const d = new Date(p.date);
              return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            }).reduce((s, p) => s + (p.sessions_completed || 0), 0);
        const monthlyCapacity = weeklyCapacity * 4;
        const capacityUtilization = monthlyCapacity > 0 ? (thisMonthSessions / monthlyCapacity) * 100 : 0;
        const availableSlots = Math.max(0, monthlyCapacity - thisMonthSessions);

        // 3. Workload Trend (compare last 3 months) - use session_logs if available
        const getMonthSessions = (monthsAgo) => {
          const d = new Date(now.getFullYear(), now.getMonth() - monthsAgo, 1);
          if (sessionLogs.length > 0) {
            return sessionLogs.filter(l => {
              const ld = new Date(l.completed_at);
              return ld.getMonth() === d.getMonth() && ld.getFullYear() === d.getFullYear();
            }).length;
          }
          return payments.filter(p => {
            const pd = new Date(p.date);
            return pd.getMonth() === d.getMonth() && pd.getFullYear() === d.getFullYear();
          }).reduce((s, p) => s + (p.sessions_completed || 0), 0);
        };
        const workloadTrend = [
          { month: 'This Month', sessions: getMonthSessions(0) },
          { month: 'Last Month', sessions: getMonthSessions(1) },
          { month: '2 Months Ago', sessions: getMonthSessions(2) }
        ];
        const workloadDirection = workloadTrend[0].sessions > workloadTrend[1].sessions ? 'up' : workloadTrend[0].sessions < workloadTrend[1].sessions ? 'down' : 'stable';

        // 4. Average Client Lifespan
        const clientLifespans = clients.filter(c => c.status !== 'Deleted').map(c => {
          const clientPayments = payments.filter(p => p.client_id === c.id).sort((a, b) => new Date(a.date) - new Date(b.date));
          if (clientPayments.length < 1) return 0;
          const firstPayment = new Date(clientPayments[0].date);
          const lastPayment = new Date(clientPayments[clientPayments.length - 1].date);
          return (lastPayment - firstPayment) / (1000 * 60 * 60 * 24 * 30); // months
        }).filter(l => l > 0);
        const avgClientLifespan = clientLifespans.length > 0 ? clientLifespans.reduce((s, l) => s + l, 0) / clientLifespans.length : 0;

        // 5. Referral Stats
        const referrers = clients.filter(c => c.referred_by).map(c => c.referred_by);
        const referralCounts = {};
        referrers.forEach(r => { referralCounts[r] = (referralCounts[r] || 0) + 1; });
        const topReferrers = Object.entries(referralCounts)
          .map(([id, count]) => ({ client: clients.find(c => c.id === id), count }))
          .filter(r => r.client)
          .sort((a, b) => b.count - a.count)
          .slice(0, 5);
        const totalReferrals = referrers.length;

        // 6. Win-back Alerts (clients with no activity in 45+ days)
        const winbackAlerts = clients.filter(c => {
          if (c.status === 'Deleted') return false;
          const lastPayment = payments.filter(p => p.client_id === c.id).sort((a, b) => new Date(b.date) - new Date(a.date))[0];
          if (!lastPayment) return false;
          const daysSince = (now - new Date(lastPayment.date)) / (1000 * 60 * 60 * 24);
          const isComplete = lastPayment.sessions_completed >= lastPayment.sessions;
          return isComplete && daysSince > 45;
        }).map(c => {
          const lastPayment = payments.filter(p => p.client_id === c.id).sort((a, b) => new Date(b.date) - new Date(a.date))[0];
          return {
            ...c,
            daysSinceContact: Math.floor((now - new Date(lastPayment.date)) / (1000 * 60 * 60 * 24)),
            totalSpent: payments.filter(p => p.client_id === c.id).reduce((s, p) => s + parseFloat(p.amount || 0), 0)
          };
        }).sort((a, b) => b.totalSpent - a.totalSpent);

        // 7. Year-over-Year Growth
        const thisYearRevenue = payments.filter(p => new Date(p.date).getFullYear() === now.getFullYear()).reduce((s, p) => s + parseFloat(p.amount || 0), 0);
        const lastYearRevenue = payments.filter(p => new Date(p.date).getFullYear() === now.getFullYear() - 1).reduce((s, p) => s + parseFloat(p.amount || 0), 0);
        const yoyGrowth = lastYearRevenue > 0 ? ((thisYearRevenue - lastYearRevenue) / lastYearRevenue) * 100 : null;
        
        // Same month comparison
        const thisMonthThisYear = payments.filter(p => {
          const d = new Date(p.date);
          return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        }).reduce((s, p) => s + parseFloat(p.amount || 0), 0);
        const thisMonthLastYear = payments.filter(p => {
          const d = new Date(p.date);
          return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear() - 1;
        }).reduce((s, p) => s + parseFloat(p.amount || 0), 0);
        const monthYoyGrowth = thisMonthLastYear > 0 ? ((thisMonthThisYear - thisMonthLastYear) / thisMonthLastYear) * 100 : null;

        // 8. Challenge Progress
        const challengeProgress = (() => {
          const thisMonth = payments.filter(p => {
            const d = new Date(p.date);
            return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
          });
          if (monthlyChallenge.type === 'sessions') {
            // Use session_logs if available for accurate session date tracking
            if (sessionLogs.length > 0) {
              return sessionLogs.filter(l => {
                const d = new Date(l.completed_at);
                return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
              }).length;
            }
            return thisMonth.reduce((s, p) => s + (p.sessions_completed || 0), 0);
          } else if (monthlyChallenge.type === 'revenue') {
            return thisMonth.reduce((s, p) => s + parseFloat(p.amount || 0), 0);
          } else if (monthlyChallenge.type === 'clients') {
            return new Set(thisMonth.map(p => p.client_id)).size;
          }
          return 0;
        })();

        // 9. Extended Milestones
        const extendedMilestones = [];
        const totalSessions = sessionLogs.length > 0 ? sessionLogs.length : payments.reduce((s, p) => s + (p.sessions_completed || 0), 0);
        const totalClients = clients.filter(c => c.status !== 'Deleted').length;
        
        // Revenue milestones
        [1000, 2500, 5000, 10000, 25000, 50000, 100000].forEach(m => {
          if (totalIncome >= m) extendedMilestones.push({ type: 'revenue', value: m, icon: '💰', label: `${currency}${m >= 1000 ? m/1000 + 'k' : m} Earned` });
        });
        // Session milestones
        [100, 250, 500, 1000, 2500, 5000].forEach(m => {
          if (totalSessions >= m) extendedMilestones.push({ type: 'sessions', value: m, icon: '🏋️', label: `${m} Sessions` });
        });
        // Client milestones
        [10, 25, 50, 100].forEach(m => {
          if (totalClients >= m) extendedMilestones.push({ type: 'clients', value: m, icon: '👥', label: `${m} Clients` });
        });
        // Streak milestones
        const { streak } = calculateStreaksAndMilestones();
        [3, 6, 12].forEach(m => {
          if (streak >= m) extendedMilestones.push({ type: 'streak', value: m, icon: '🔥', label: `${m} Month Streak` });
        });

        // === EXPENSE & PROFIT ANALYTICS ===
        
        // This month base expenses (without share)
        const thisMonthBaseExpenses = expenses.filter(e => {
          const d = new Date(e.date);
          return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        }).reduce((s, e) => s + parseFloat(e.amount || 0), 0);
        
        // This month revenue
        const thisMonthRevenue = payments.filter(p => {
          const d = new Date(p.date);
          return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        }).reduce((s, p) => s + parseFloat(p.amount || 0), 0);
        
        // Revenue share calculation (percentage of revenue)
        const thisMonthShare = (thisMonthRevenue * revenueSharePercent) / 100;
        const thisMonthExpenses = thisMonthBaseExpenses + thisMonthShare;
        
        // Last month expenses
        const lastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
        const lastMonthBaseExpenses = expenses.filter(e => {
          const d = new Date(e.date);
          return d.getMonth() === lastMonth.getMonth() && d.getFullYear() === lastMonth.getFullYear();
        }).reduce((s, e) => s + parseFloat(e.amount || 0), 0);
        const lastMonthRevForShare = payments.filter(p => {
          const d = new Date(p.date);
          return d.getMonth() === lastMonth.getMonth() && d.getFullYear() === lastMonth.getFullYear();
        }).reduce((s, p) => s + parseFloat(p.amount || 0), 0);
        const lastMonthExpenses = lastMonthBaseExpenses + (lastMonthRevForShare * revenueSharePercent / 100);
        
        // Profit calculations
        const thisMonthProfit = thisMonthRevenue - thisMonthExpenses;
        const profitMargin = thisMonthRevenue > 0 ? (thisMonthProfit / thisMonthRevenue) * 100 : 0;
        
        // Total expenses (including share on all revenue)
        const totalShare = (totalIncome * revenueSharePercent) / 100;
        const totalBaseExpenses = expenses.reduce((s, e) => s + parseFloat(e.amount || 0), 0);
        const totalExpenses = totalBaseExpenses + totalShare;
        const totalProfit = totalIncome - totalExpenses;
        const totalProfitMargin = totalIncome > 0 ? (totalProfit / totalIncome) * 100 : 0;
        
        // Expenses by category (add Share as calculated)
        const expensesByCategory = {};
        expenseCategories.forEach(cat => {
          expensesByCategory[cat] = expenses.filter(e => e.category === cat).reduce((s, e) => s + parseFloat(e.amount || 0), 0);
        });
        expensesByCategory['Share'] = thisMonthShare; // Add calculated share
        
        // Expense trend (last 6 months) - include share
        const expenseTrend = [];
        for (let i = 5; i >= 0; i--) {
          const date = new Date(now.getFullYear(), now.getMonth() - i, 1);
          const monthName = date.toLocaleString('en-US', { month: 'short' });
          const monthBaseExpenses = expenses.filter(e => {
            const eDate = new Date(e.date);
            return eDate.getMonth() === date.getMonth() && eDate.getFullYear() === date.getFullYear();
          }).reduce((s, e) => s + parseFloat(e.amount || 0), 0);
          const monthRevenue = payments.filter(p => {
            const pDate = new Date(p.date);
            return pDate.getMonth() === date.getMonth() && pDate.getFullYear() === date.getFullYear();
          }).reduce((s, p) => s + parseFloat(p.amount || 0), 0);
          const monthShare = (monthRevenue * revenueSharePercent) / 100;
          const monthExpenses = monthBaseExpenses + monthShare;
          expenseTrend.push({ month: monthName, expenses: monthExpenses, revenue: monthRevenue, profit: monthRevenue - monthExpenses });
        }
        
        // Expense change vs last month
        const expenseChange = lastMonthExpenses > 0 ? ((thisMonthExpenses - lastMonthExpenses) / lastMonthExpenses) * 100 : 0;

        // === MONTHLY MEMBERSHIP STATS ===
        const monthlyPayments = payments.filter(p => p.type === 'Monthly');
        const monthlyStats = {
          totalMembers: new Set(monthlyPayments.map(p => p.client_id)).size,
          totalSessionsIncluded: monthlyPayments.reduce((s, p) => s + (p.sessions || 0), 0),
          totalSessionsUsed: monthlyPayments.reduce((s, p) => s + (p.sessions_completed || 0), 0),
          utilizationRate: 0,
          avgSessionsPerMember: 0,
          avgUtilizationPerMember: 0
        };
        if (monthlyStats.totalSessionsIncluded > 0) {
          monthlyStats.utilizationRate = (monthlyStats.totalSessionsUsed / monthlyStats.totalSessionsIncluded) * 100;
        }
        if (monthlyStats.totalMembers > 0) {
          monthlyStats.avgSessionsPerMember = monthlyStats.totalSessionsIncluded / monthlyPayments.length;
        }
        // Per-client monthly stats
        const monthlyClientStats = [];
        const monthlyClientIds = [...new Set(monthlyPayments.map(p => p.client_id))];
        monthlyClientIds.forEach(clientId => {
          const clientPayments = monthlyPayments.filter(p => p.client_id === clientId);
          const client = clients.find(c => c.id === clientId);
          const included = clientPayments.reduce((s, p) => s + (p.sessions || 0), 0);
          const used = clientPayments.reduce((s, p) => s + (p.sessions_completed || 0), 0);
          const util = included > 0 ? (used / included) * 100 : 0;
          monthlyClientStats.push({
            client,
            payments: clientPayments.length,
            sessionsIncluded: included,
            sessionsUsed: used,
            utilization: util
          });
        });

        return { 
          incomeByType, 
          totalIncome, 
          bestDay, 
          avgPackSize, 
          avgPackValue, 
          retentionRate,
          incomeByDay,
          sessionsByDay,
          dayNames,
          // New features
          upsellOpportunities,
          capacityUtilization,
          availableSlots,
          monthlyCapacity,
          thisMonthSessions,
          workloadTrend,
          workloadDirection,
          avgClientLifespan,
          topReferrers,
          totalReferrals,
          winbackAlerts,
          thisYearRevenue,
          lastYearRevenue,
          yoyGrowth,
          thisMonthThisYear,
          thisMonthLastYear,
          monthYoyGrowth,
          challengeProgress,
          extendedMilestones,
          // Expense analytics
          thisMonthExpenses,
          thisMonthShare,
          thisMonthBaseExpenses,
          lastMonthExpenses,
          thisMonthProfit,
          profitMargin,
          totalExpenses,
          totalProfit,
          totalProfitMargin,
          expensesByCategory,
          expenseTrend,
          expenseChange,
          // Monthly membership stats
          monthlyStats,
          monthlyClientStats
        };
      };

      useEffect(() => {
        supabaseClient.auth.getSession().then(({ data: { session } }) => { setUser(session?.user ?? null); setLoading(false); });
        const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => { setUser(session?.user ?? null); });
        return () => subscription.unsubscribe();
      }, []);

      useEffect(() => { if (user) checkSubscription(); }, [user]);

      const checkSubscription = async () => {
        setCheckingSub(true);
        try {
          const { data } = await supabaseClient.from('subscriptions').select('*').eq('email', user.email).eq('status', 'active').single();
          if (data) {
            if (data.plan_type !== 'lifetime' && data.expires_at && new Date(data.expires_at) < new Date()) {
              setSubscription(null);
            } else {
              setSubscription(data);
              fetchAllData();
            }
          } else { setSubscription(null); }
        } catch { setSubscription(null); }
        finally { setCheckingSub(false); }
      };

      const fetchAllData = async () => {
        const [c, p, t, e, s] = await Promise.all([
          supabaseClient.from('clients').select('*').order('created_at', { ascending: false }),
          supabaseClient.from('payments').select('*, clients(name)').order('date', { ascending: false }),
          supabaseClient.from('targets').select('*'),
          supabaseClient.from('expenses').select('*').order('date', { ascending: false }),
          supabaseClient.from('session_logs').select('*').order('completed_at', { ascending: false })
        ]);
        setClients(c.data || []);
        setPayments(p.data || []);
        setExpenses(e.data || []);
        setSessionLogs(s.data || []);
        if (t.data?.length === 0) {
          const def = [{ target_name: 'Monthly Revenue', goal: 5000, user_id: user.id }, { target_name: 'Active Clients', goal: 15, user_id: user.id }];
          await supabaseClient.from('targets').insert(def);
          setTargets(def);
        } else { setTargets(t.data || []); }
      };

      const handleAddExpense = async () => {
        // For Share, calculate amount from percentage
        if (newExpense.category === 'Share') {
          if (!newExpense.share_percentage) return;
          
          let baseAmount = 0;
          let noteText = '';
          
          if (newExpense.share_mode === 'monthly') {
            // Calculate from monthly revenue
            const expenseDate = new Date(newExpense.date);
            baseAmount = payments.filter(p => {
              const pDate = new Date(p.date);
              return pDate.getMonth() === expenseDate.getMonth() && pDate.getFullYear() === expenseDate.getFullYear();
            }).reduce((s, p) => s + parseFloat(p.amount || 0), 0);
            const monthName = expenseDate.toLocaleString('en', { month: 'short', year: 'numeric' });
            noteText = `${newExpense.share_percentage}% of ${monthName} revenue (${currency}${baseAmount.toFixed(0)})`;
          } else if (newExpense.share_mode === 'payment') {
            // Calculate from specific payment
            if (!newExpense.share_payment_id) return;
            const payment = payments.find(p => p.id === newExpense.share_payment_id);
            baseAmount = parseFloat(payment?.amount || 0);
            noteText = `${newExpense.share_percentage}% of ${payment?.clients?.name} - ${currency}${baseAmount.toFixed(0)}`;
          }
          
          const shareAmount = baseAmount * (parseFloat(newExpense.share_percentage) / 100);
          
          await supabaseClient.from('expenses').insert([{
            category: 'Share',
            amount: shareAmount,
            note: noteText,
            date: newExpense.date,
            user_id: user.id
          }]);
        } else {
          if (!newExpense.amount) return;
          await supabaseClient.from('expenses').insert([{
            category: newExpense.category,
            amount: parseFloat(newExpense.amount),
            note: newExpense.note || '',
            date: newExpense.date,
            user_id: user.id
          }]);
        }
        setNewExpense({ category: 'Rent', amount: '', note: '', date: new Date().toISOString().split('T')[0], share_percentage: '', share_mode: 'monthly', share_payment_id: '' });
        setShowExpenseModal(false);
        fetchAllData();
      };

      const handleUpdateExpense = async () => {
        if (!editingExpense?.amount) return;
        await supabaseClient.from('expenses').update({
          category: editingExpense.category,
          amount: parseFloat(editingExpense.amount),
          note: editingExpense.note || '',
          date: editingExpense.date
        }).eq('id', editingExpense.id);
        setEditingExpense(null);
        fetchAllData();
      };

      const handleDeleteExpense = async (id) => {
        if (!confirm('Delete this expense?')) return;
        await supabaseClient.from('expenses').delete().eq('id', id);
        fetchAllData();
      };

      const handleAddClient = async () => {
        if (!newClient.name.trim()) return;
        const clientData = { name: newClient.name, user_id: user.id, status: 'Active' };
        if (newClient.referred_by) clientData.referred_by = newClient.referred_by;
        await supabaseClient.from('clients').insert([clientData]);
        setNewClient({ name: '', email: '', phone: '', referred_by: '' }); setShowNewClientModal(false); fetchAllData();
      };

      const handleAddPayment = async () => {
        if (!newPayment.client_id || !newPayment.amount || !newPayment.sessions) return;
        // For Single sessions, amount is price per session, so multiply by sessions
        // For Pack/Monthly, amount is total package price
        const totalAmount = newPayment.type === 'Single' 
          ? parseFloat(newPayment.amount) * parseInt(newPayment.sessions)
          : parseFloat(newPayment.amount);
        await supabaseClient.from('payments').insert([{ 
          client_id: newPayment.client_id, 
          type: newPayment.type, 
          amount: totalAmount, 
          sessions: parseInt(newPayment.sessions), 
          sessions_completed: 0, 
          duration: newPayment.duration || 60,
          user_id: user.id, 
          date: newPayment.date 
        }]);
        setNewPayment({ client_id: '', type: 'Pack', amount: '', sessions: '', duration: 60, date: new Date().toISOString().split('T')[0] }); 
        setShowPaymentModal(false); 
        fetchAllData();
      };

      const updateSession = async (id, curr, total, action) => {
        if (action === 'add' && curr < total) {
          // Show date picker modal for adding session
          setPendingSession({ id, curr, total });
          setSessionDate(new Date().toISOString().split('T')[0]);
          setShowSessionDateModal(true);
        } else if (action === 'deduct' && curr > 0) {
          // Deduct: remove the most recent session log and decrement counter
          const newVal = curr - 1;
          // Optimistic update
          setPayments(prev => prev.map(p => p.id === id ? {...p, sessions_completed: newVal} : p));
          // Update database
          await supabaseClient.from('payments').update({ sessions_completed: newVal }).eq('id', id);
          // Delete most recent session log for this payment
          const latestLog = sessionLogs.filter(l => l.payment_id === id).sort((a, b) => new Date(b.completed_at) - new Date(a.completed_at))[0];
          if (latestLog) {
            await supabaseClient.from('session_logs').delete().eq('id', latestLog.id);
            setSessionLogs(prev => prev.filter(l => l.id !== latestLog.id));
          }
        }
      };

      const confirmAddSession = async () => {
        if (!pendingSession) return;
        const { id, curr, total } = pendingSession;
        const newVal = Math.min(curr + 1, total);
        
        // Optimistic update
        setPayments(prev => prev.map(p => p.id === id ? {...p, sessions_completed: newVal} : p));
        
        // Update sessions_completed counter
        await supabaseClient.from('payments').update({ sessions_completed: newVal }).eq('id', id);
        
        // Add session log with the selected date
        const { data } = await supabaseClient.from('session_logs').insert([{
          payment_id: id,
          completed_at: sessionDate,
          user_id: user.id
        }]).select();
        
        if (data) {
          setSessionLogs(prev => [data[0], ...prev]);
        }
        
        setShowSessionDateModal(false);
        setPendingSession(null);

      const now = new Date();
      const thisMonthPayments = payments.filter(p => { const d = new Date(p.date); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); });
      const thisMonthRevenue = thisMonthPayments.reduce((s, p) => s + parseFloat(p.amount || 0), 0);
      const lastMonthPayments = payments.filter(p => { const d = new Date(p.date); const lm = new Date(now.getFullYear(), now.getMonth() - 1, 1); return d.getMonth() === lm.getMonth() && d.getFullYear() === lm.getFullYear(); });
      const lastMonthRevenue = lastMonthPayments.reduce((s, p) => s + parseFloat(p.amount || 0), 0);
      const totalRevenue = payments.reduce((s, p) => s + parseFloat(p.amount || 0), 0);
      const revenueTrend = lastMonthRevenue > 0 ? Math.round(((thisMonthRevenue - lastMonthRevenue) / lastMonthRevenue) * 100) : null;
      const activeClients = clients.filter(c => c.status === 'Active').length;

              {/* Buttons */}

                <button onClick={() => setShowPaymentModal(false)} className="flex-1 py-3 bg-gray-700 hover:bg-gray-600 rounded-xl font-medium">Cancel</button>

              <div><label className="block text-gray-400 text-sm mb-2">Active Clients Goal</label><input type="number" value={editTargets.clientsGoal} onChange={(e) => setEditTargets({...editTargets, clientsGoal: parseInt(e.target.value)||0})} className="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-3 text-white focus:border-cyan-500 focus:outline-none" /></div>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('SW registered:', registration.scope);
          })
          .catch((error) => {
            console.log('SW registration failed:', error);
          });
      });
    }
  </script>
